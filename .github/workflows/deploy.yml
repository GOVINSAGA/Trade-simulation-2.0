name: Build and Deploy to OCI

on:
  push:
    branches:
      - master

env:
  API_IMAGE: ghcr.io/${{ github.repository }}-api
  CLIENT_IMAGE: ghcr.io/${{ github.repository }}-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: ./TradeSimulation.API
          push: true
          tags: ${{ env.API_IMAGE }}:latest

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./TradeSimulation.Client
          push: true
          tags: ${{ env.CLIENT_IMAGE }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to OCI VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/tradesim
            cd ~/tradesim
            
            # Create/Update docker-compose file manually on VM
            cat << 'EOF' > docker-compose.prod.yml
            services:
              postgres:
                image: postgres:16-alpine
                container_name: trade_sim_db
                environment:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: postgres123
                  POSTGRES_DB: trade_simulation
                volumes:
                  - pgdata:/var/lib/postgresql/data
                networks:
                  - tradesim-net
                restart: unless-stopped
            
              api:
                image: ${{ env.API_IMAGE }}:latest
                container_name: trade_sim_api
                depends_on:
                  - postgres
                environment:
                  - ASPNETCORE_ENVIRONMENT=Production
                  - ConnectionStrings__DefaultConnection=Host=postgres;Database=trade_simulation;Username=postgres;Password=postgres123
                networks:
                  - tradesim-net
                restart: unless-stopped
            
              client:
                image: ${{ env.CLIENT_IMAGE }}:latest
                container_name: trade_sim_client
                depends_on:
                  - api
                ports:
                  - "5050:80"
                networks:
                  - tradesim-net
                restart: unless-stopped
            
            networks:
              tradesim-net:
                driver: bridge
            
            volumes:
              pgdata:
            EOF
            
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
